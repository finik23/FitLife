<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FitLife | Calculadora Fitness</title>

    <meta name="description" content="Calcula tu IMC, TMB y calorías diarias según tu objetivo fitness.">

    <link rel="icon" type="image/png" href="fynn@.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
     HEADER
========================= -->

<header>

    <a href="index.html" class="logo">
        <img src="logofitlife.png" alt="FITLIFE" />
    </a>

    <button class="menu-toggle" type="button">☰</button>

    <nav id="menu">

        <a href="index.html">Inicio</a>
        <a href="entrenamiento.html">Entrenamiento</a>
        <a href="nutricion.html">Nutrición</a>
        <a href="#" id="salir">Salir</a>
        

    </nav>

</header>

<main>

<!-- =========================
     CALCULADORA
========================= -->

<section class="calculadoras">

    <h2>Calculadora Fitness</h2>

    <p>
        Calcula tu IMC, metabolismo basal y calorías según tu objetivo.
    </p>

    <div class="calculator-box">

        <label for="peso">Peso (kg)</label>
        <input type="number" id="peso" placeholder="Ej: 75">

        <label for="altura">Altura (cm)</label>
        <input type="number" id="altura" placeholder="Ej: 180">

        <label for="edad">Edad</label>
        <input type="number" id="edad" placeholder="Ej: 30">

        <label for="sexo">Sexo</label>
        <select id="sexo">
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
        </select>

        <label for="actividad">Nivel de actividad</label>
        <select id="actividad">
            <option value="1.2">Sedentario</option>
            <option value="1.375">Ligero (1-3 días)</option>
            <option value="1.55">Moderado (3-5 días)</option>
            <option value="1.725">Alto (6-7 días)</option>
        </select>

        <label for="objetivo">Objetivo</label>
        <select id="objetivo">
            <option value="mantener">Mantener peso</option>
            <option value="perder">Perder grasa</option>
            <option value="ganar">Ganar músculo</option>
        </select>

        <label for="pesoObjetivo">Peso objetivo (kg)</label>
        <input type="number" id="pesoObjetivo" placeholder="Ej: 70">

        <button class="btn" id="calcular">Calcular</button>
        <button class="btn reset" id="reset">Reiniciar</button>

        <div id="resultado"></div>

    </div>

</section>

</main>

     FOOTER
========================= -->

</body>
</html>
